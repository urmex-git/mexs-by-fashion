<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mex by Fashion</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f8f8f8;}
h1{text-align:center;color:#333;margin:20px 0;}
.shop-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;max-width:1000px;margin:auto;padding:10px;}
.flip-card{background:transparent;width:180px;height:250px;perspective:1000px;transition:transform 0.3s;}
.flip-card-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform 0.6s;transform-style:preserve-3d;}
.flip-card:hover .flip-card-inner{transform:rotateY(180deg);}
.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;overflow:hidden;box-shadow:0 6px 12px rgba(0,0,0,0.15);}
.flip-card-front{background:#fff;display:flex;align-items:center;justify-content:center;}
.flip-card-front img{width:100%;height:100%;object-fit:cover;}
.flip-card-back{background:#ffebcd;color:#333;transform:rotateY(180deg);padding:10px;display:flex;flex-direction:column;justify-content:center;}
.admin-panel{max-width:500px;margin:20px auto;background:#ffe0b2;padding:20px;border-radius:12px;box-shadow:0 6px 10px rgba(0,0,0,0.1);}
input,button,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#FF5722;color:#fff;border:none;cursor:pointer;transition:0.3s;}
button:hover{background:#E64A19;}
.preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;margin-bottom:10px;}
.actions{margin-top:10px;display:flex;justify-content:space-between;}
.actions button{width:48%;}
#cart{max-width:500px;margin:20px auto;background:#e3f2fd;padding:10px;border-radius:10px;}
#cart ul{max-height:200px;overflow-y:auto;margin:0;padding:0;list-style:none;}
#cart li{display:flex;justify-content:space-between;margin:5px 0;}
#suggestions{max-width:500px;margin:20px auto;background:#fff3e0;padding:10px;border-radius:10px;}
@media(max-width:600px){.shop-container{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}}
</style>
</head>
<body>

<h1>Mex by Fashion</h1>

<div id="loginPrompt" style="text-align:center;">
<button onclick="adminLogin()">Admin Login</button>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
<h3>Admin Upload Panel</h3>
<input type="file" id="productImage" accept="image/*" onchange="showPreview(event)">
<div class="preview" id="imagePreview"></div>
<input type="text" id="productName" placeholder="Product Name">
<input type="number" id="productPrice" placeholder="Price (₹)">
<input type="text" id="productCategory" placeholder="Category">
<button onclick="addProduct()">Add Product</button>
</div>

<div style="max-width:500px;margin:20px auto;">
<input type="text" id="searchInput" placeholder="Search Products..." onkeyup="displayProducts()">
<select id="categoryFilter" onchange="displayProducts()"><option value="">All Categories</option></select>
</div>

<div class="shop-container" id="productContainer"></div>

<div id="cart">
<h3>Cart</h3>
<ul id="cartList"></ul>
<strong>Total: ₹<span id="totalPrice">0</span></strong>
<button onclick="checkout()">Checkout</button>
</div>

<div id="suggestions">
<h3>AI Product Recommendations</h3>
<ul id="suggestionsList"></ul>
</div>

<script>
let products=JSON.parse(localStorage.getItem('products'))||[];
let cart=JSON.parse(localStorage.getItem('cart'))||[];
let selectedImage='';
let adminLoggedIn=false;

function adminLogin(){
const pwdInput=document.createElement('input');
pwdInput.type='password';
pwdInput.placeholder='Enter admin password';
pwdInput.style.position='fixed';
pwdInput.style.top='50%';
pwdInput.style.left='50%';
pwdInput.style.transform='translate(-50%,-50%)';
pwdInput.style.padding='10px';
pwdInput.style.zIndex=1000;
document.body.appendChild(pwdInput);
pwdInput.focus();
pwdInput.addEventListener('keydown',function(e){
if(e.key==='Enter'){
const password=pwdInput.value;
document.body.removeChild(pwdInput);
if(password==="urmexs"){adminLoggedIn=true;
document.getElementById('adminPanel').style.display='block';
document.getElementById('loginPrompt').style.display='none';
alert("Admin logged in!");displayProducts();
}else{alert("Wrong password!");}}});}

function showPreview(event){
const preview=document.getElementById('imagePreview');
preview.innerHTML='';
if(event.target.files && event.target.files[0]){
selectedImage=URL.createObjectURL(event.target.files[0]);
const img=document.createElement('img');img.src=selectedImage;
preview.appendChild(img);}}

function addProduct(){
if(!adminLoggedIn){alert("Only admin can add products!");return;}
const name=document.getElementById('productName').value.trim();
const price=document.getElementById('productPrice').value.trim();
const category=document.getElementById('productCategory').value.trim();
if(!name||!price||!category||!selectedImage){alert('Fill all fields + select image');return;}
const product={name,price:parseFloat(price),category,image:selectedImage};
products.unshift(product);
saveData();displayProducts();
document.getElementById('productName').value='';
document.getElementById('productPrice').value='';
document.getElementById('productCategory').value='';
document.getElementById('productImage').value='';
document.getElementById('imagePreview').innerHTML='';
selectedImage='';
}

function displayProducts(){
const filter=document.getElementById('searchInput').value.toLowerCase();
const catFilter=document.getElementById('categoryFilter').value;
const container=document.getElementById('productContainer');
container.innerHTML='';
products.forEach((p,i)=>{
if((p.name.toLowerCase().includes(filter)||p.category.toLowerCase().includes(filter))&&(catFilter===''||p.category===catFilter)){
const card=document.createElement('div');card.className='flip-card';
card.innerHTML=`<div class="flip-card-inner">
<div class="flip-card-front"><img src="${p.image}" alt="${p.name}"></div>
<div class="flip-card-back">
<strong>${p.name}</strong><br>₹${p.price}<br>${p.category}
${adminLoggedIn?`<div class="actions">
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>
</div>`:''}
<button onclick="addToCart(${i})" style="margin-top:5px;">Add to Cart</button>
</div></div>`;
container.appendChild(card);}});
updateCategoryFilter();displayCart();updateSuggestions();}

function editProduct(index){
if(!adminLoggedIn){alert("Only admin can edit!");return;}
const p=products[index];
const newName=prompt('Edit Name:',p.name);
const newPrice=prompt('Edit Price:',p.price);
const newCategory=prompt('Edit Category:',p.category);
if(newName&&newPrice&&newCategory){products[index]={...p,name:newName,price:parseFloat(newPrice),category:newCategory};
saveData();displayProducts();}}

function deleteProduct(index){products.splice(index,1);saveData();displayProducts();}
function updateCategoryFilter(){
const select=document.getElementById('categoryFilter');
const categories=[...new Set(products.map(p=>p.category))];
select.innerHTML='<option value="">All Categories</option>';categories.forEach(cat=>select.innerHTML+=`<option value="${cat}">${cat}</option>`);}
function addToCart(index){cart.push(products[index]);saveData();displayCart();updateSuggestions();}
function displayCart(){const cartList=document.getElementById('cartList');cartList.innerHTML='';let total=0;cart.forEach((item,i)=>{total+=item.price;const li=document.createElement('li');li.innerHTML=`${item.name} - ₹${item.price} <button onclick="removeFromCart(${i})">Remove</button>`;cartList.appendChild(li);});document.getElementById('totalPrice').innerText=total.toFixed(2);}
function removeFromCart(index){cart.splice(index,1);saveData();displayCart();updateSuggestions();}
function checkout(){if(cart.length===0){alert('Cart is empty!');return;}alert(`Checkout Simulation\nTotal: ₹${document.getElementById('totalPrice').innerText}`);cart=[];saveData();displayCart();updateSuggestions();}
function updateSuggestions(){const suggestionsList=document.getElementById('suggestionsList');suggestionsList.innerHTML='';if(cart.length===0){const categories={};products.forEach(p=>categories[p.category]=(categories[p.category]||0)+1);Object.keys(categories).sort((a,b)=>categories[b]-categories[a]).slice(0,5).forEach(cat=>{const li=document.createElement('li');li.textContent=`Top category: ${cat}`;suggestionsList.appendChild(li);});}else{const cartCats=[...new Set(cart.map(p=>p.category))];const recommended=products.filter(p=>cartCats.includes(p.category)&&!cart.includes(p));recommended.slice(0,5).forEach(p=>{const li=document.createElement('li');li.textContent=`Recommended: ${p.name} (${p.category})`;suggestionsList.appendChild(li);});}}
function saveData(){localStorage.setItem('products',JSON.stringify(products));localStorage.setItem('cart',JSON.stringify(cart));}
displayProducts();
</script>
</body>
</html>
