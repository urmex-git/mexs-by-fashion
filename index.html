<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mexs by Fashion</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f4f4f4; }
h1 { text-align:center; color:#333; margin-bottom:20px; }
.shop-container { max-width:1000px; margin:auto; display:grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap:20px; }
.flip-card { background-color: transparent; width:180px; height:250px; perspective:1000px; }
.flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
.flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius:12px; overflow:hidden; box-shadow:0 6px 10px rgba(0,0,0,0.15);}
.flip-card-front { background:#fff; display:flex; align-items:center; justify-content:center; }
.flip-card-front img { width:100%; height:100%; object-fit:cover; }
.flip-card-back { background:#ffebcd; color:#333; transform: rotateY(180deg); padding:10px; display:flex; flex-direction:column; justify-content:center; }
.admin-panel { max-width:500px; margin:20px auto; background:#ffe0b2; padding:20px; border-radius:12px; box-shadow:0 6px 10px rgba(0,0,0,0.1);}
input, button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
button { background:#FF5722; color:#fff; border:none; cursor:pointer; transition:0.3s;}
button:hover { background:#E64A19; }
.preview img { width:80px; height:80px; object-fit:cover; border-radius:8px; margin-bottom:10px;}
.actions { margin-top:10px; display:flex; justify-content:space-between;}
.actions button { width:48%; }
</style>
</head>
<body>

<h1>Mexs by Fashion</h1>

<div id="loginPrompt" style="text-align:center;">
  <button onclick="adminLogin()">Admin Login</button>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
  <h3>Admin Upload Panel</h3>
  <input type="file" id="productImage" accept="image/*" onchange="showPreview(event)">
  <div class="preview" id="imagePreview"></div>
  <input type="text" id="productName" placeholder="Product Name">
  <input type="number" id="productPrice" placeholder="Price (₹)">
  <input type="text" id="productCategory" placeholder="Category">
  <button onclick="addProduct()">Add Product</button>
</div>

<div class="shop-container" id="productContainer"></div>

<script>
let products = JSON.parse(localStorage.getItem('products'))||[];
let selectedImage = '';
let adminLoggedIn = false;

function adminLogin(){
  const password = prompt("Enter admin password:");
  if(password==="1234"){
    adminLoggedIn=true;
    document.getElementById('adminPanel').style.display='block';
    document.getElementById('loginPrompt').style.display='none';
    alert("Admin logged in!");
  } else { alert("Wrong password!"); }
}

function showPreview(event){
  const preview=document.getElementById('imagePreview');
  preview.innerHTML='';
  if(event.target.files && event.target.files[0]){
    selectedImage=URL.createObjectURL(event.target.files[0]);
    const img=document.createElement('img'); img.src=selectedImage;
    preview.appendChild(img);
  }
}

function addProduct(){
  if(!adminLoggedIn){ alert("Only admin can add products!"); return; }
  const name=document.getElementById('productName').value.trim();
  const price=document.getElementById('productPrice').value.trim();
  const category=document.getElementById('productCategory').value.trim();
  if(!name||!price||!category||!selectedImage){ alert('Fill all fields + select image'); return; }
  const product={name,price:parseFloat(price),category,image:selectedImage};
  products.unshift(product);
  saveData(); displayProducts();
  document.getElementById('productName').value='';
  document.getElementById('productPrice').value='';
  document.getElementById('productCategory').value='';
  document.getElementById('productImage').value='';
  document.getElementById('imagePreview').innerHTML='';
  selectedImage='';
}

function displayProducts(){
  const container=document.getElementById('productContainer');
  container.innerHTML='';
  products.forEach((p,i)=>{
    const card=document.createElement('div'); card.className='flip-card';
    card.innerHTML=`
    <div class="flip-card-inner">
      <div class="flip-card-front"><img src="${p.image}" alt="${p.name}"></div>
      <div class="flip-card-back">
        <strong>${p.name}</strong><br>₹${p.price}<br>${p.category}
        ${adminLoggedIn?`<div class="actions">
        <button onclick="editProduct(${i})">Edit</button>
        <button onclick="deleteProduct(${i})">Delete</button>
        </div>`:''}
      </div>
    </div>`;
    container.appendChild(card);
  });
}

function editProduct(index){
  if(!adminLoggedIn){ alert("Only admin can edit!"); return; }
  const p=products[index];
  const newName=prompt('Edit Name:',p.name);
  const newPrice=prompt('Edit Price:',p.price);
  const newCategory=prompt('Edit Category:',p.category);
  if(newName&&newPrice&&newCategory){
    products[index]={...p,name:newName,price:parseFloat(newPrice),category:newCategory};
    saveData(); displayProducts();
  }
}

function deleteProduct(index){ products.splice(index,1); saveData(); displayProducts(); }

function saveData(){ localStorage.setItem('products',JSON.stringify(products)); }

// Initial load
displayProducts();
</script>
</body>
</html>
